# ── Networks ─────────────────────────────────────────────────────
networks:
  rag_net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────
volumes:
  qdrant_data:
  postgres_data:
  redis_data:

services:
  # ── Qdrant ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: rag_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: WARN
    networks: [rag_net]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 5 bash -c 'echo > /dev/tcp/localhost/6333' || exit 1",
        ]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 30s

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_dev_only}
      POSTGRES_DB: rag_platform
    networks: [rag_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    networks: [rag_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RAG Platform API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: rag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag_platform
    volumes:
      - ./app:/app/app # DEV ONLY: remove this line in production!
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [rag_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Langfuse (LLM observability) ─────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    container_name: rag_langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag_platform
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change_this_before_production}
      SALT: ${LANGFUSE_SALT:-change_this_before_production}
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks: [rag_net]
    profiles: ["observability"] # opt-in: docker compose --profile observability up
