name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run workflow on"
        required: true
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: "local"
  REDIS_URL: "redis://localhost:6379/0"
  DATABASE_URL: "postgresql+asyncpg://rag:rag_ci@localhost:5432/rag_platform"
  QDRANT_URL: "http://localhost:6333"
  LANGFUSE_ENABLED: "false"
  RAGAS_EVAL_ENABLED: "false"
  LOG_FORMAT: "json"
  LOG_LEVEL: "WARNING"

jobs:
  # ── Lint & typecheck ──────────────────────────────────────────
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install quality tools
        run: pip install ruff==0.6.8 mypy==1.11.2 pydantic==2.9.2 pydantic-settings==2.5.2

      - name: Lint (ruff)
        run: ruff check app tests --output-format=github

      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      ANTHROPIC_API_KEY: "test_key_not_real"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration + E2E tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      ANTHROPIC_API_KEY: "test_key_not_real"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run integration + E2E tests
        run: pytest tests/integration/ tests/e2e/ -v --tb=short

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_NEXTAUTH_SECRET: ${{ secrets.LANGFUSE_NEXTAUTH_SECRET }}
      LANGFUSE_SALT: ${{ secrets.LANGFUSE_SALT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:staging
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging server
        run: |
          echo "Deploying ghcr.io/${{ github.repository }}:${{ github.sha }} to staging"
