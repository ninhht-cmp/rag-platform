# .github/workflows/ci.yml
# CI/CD Pipeline — lint, typecheck, test, build Docker images

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:

  # ---- Agent (TypeScript) ----
  agent-ci:
    name: Agent CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          ANTHROPIC_API_KEY: sk-ant-test-key
          JWT_SECRET: test-secret-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0

      - name: Build
        run: npm run build

  # ---- RAG Service (Python) ----
  rag-ci:
    name: RAG Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.5

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check src

      - name: Type check (mypy)
        run: poetry run mypy src

      - name: Test
        run: poetry run pytest tests/ --cov=src --cov-report=xml
        env:
          ANTHROPIC_API_KEY: sk-ant-test-key
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          VOYAGEAI_API_KEY: test-key

  # ---- Build & Push Docker (chỉ khi merge vào main) ----
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [agent-ci, rag-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Agent image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/agent:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/agent:${{ github.sha }}

      - name: Build and push RAG Service image
        uses: docker/build-push-action@v5
        with:
          context: ./rag-service
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/rag-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/rag-service:${{ github.sha }}
