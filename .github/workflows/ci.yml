name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run workflow on"
        required: true
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: "local"
  REDIS_URL: "redis://localhost:6379/0"
  DATABASE_URL: "postgresql+asyncpg://rag:rag_ci@localhost:5432/rag_platform"
  QDRANT_URL: "http://localhost:6333"
  LANGFUSE_ENABLED: "false"
  RAGAS_EVAL_ENABLED: "false"
  LOG_FORMAT: "json"
  LOG_LEVEL: "WARNING"
  # FIX #4: Hardcode a safe CI-only SECRET_KEY (≥32 chars, not used in any real env).
  # Never use this value outside CI — it is intentionally public.
  SECRET_KEY: "ci-only-secret-key-not-for-production-use-32x"
  ANTHROPIC_API_KEY: "test_key_not_real"

jobs:
  # ── Lint & typecheck ──────────────────────────────────────────
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # FIX #1 + #2: Install the full dep set so mypy can resolve all imports.
      # Versions are pinned to match pyproject.toml — no more drift between
      # quality tools and the actual runtime environment.
      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests --output-format=github

      - name: Format check (ruff)
        run: ruff format app tests --check

      # FIX #2: mypy now has all stubs available (installed above).
      # FIX #3: removed continue-on-error — type errors must be fixed, not ignored.
      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports

  # ── Unit tests ────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    # No services needed — unit tests mock all infra (Qdrant, Redis, Postgres).
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Integration + E2E tests ───────────────────────────────────
  integration-tests:
    name: Integration + E2E tests
    runs-on: ubuntu-latest
    # FIX #5: Spin up the real services that the app connects to at startup.
    # Versions match docker-compose.yml and qdrant-client==1.17.1 in pyproject.toml.
    services:
      qdrant:
        image: qdrant/qdrant:v1.17.1
        ports:
          - 6333:6333
        options: >-
          --health-cmd "timeout 5 bash -c 'echo > /dev/tcp/localhost/6333'"
          --health-interval 10s
          --health-timeout 8s
          --health-retries 10
          --health-start-period 30s

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag_ci
          POSTGRES_DB: rag_platform
        options: >-
          --health-cmd "pg_isready -U rag -d rag_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Apply DB schema
        run: |
          PGPASSWORD=rag_ci psql \
            -h localhost -U rag -d rag_platform \
            -f infrastructure/postgres/init.sql

      - name: Run integration + E2E tests
        run: pytest tests/integration/ tests/e2e/ -v --tb=short

  # ── Docker build ──────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    # FIX #6: depend on both test jobs — a passing build image with failing
    # integration tests is misleading and should not proceed to deploy.
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: false
          # Layer cache shared across workflow runs via GitHub Actions cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_NEXTAUTH_SECRET: ${{ secrets.LANGFUSE_NEXTAUTH_SECRET }}
      LANGFUSE_SALT: ${{ secrets.LANGFUSE_SALT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:staging
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # FIX #7: Replace placeholder echo with a real SSH-based deploy.
      # Requires these secrets on the staging environment:
      #   STAGING_SSH_KEY  — private key for the staging server
      #   STAGING_HOST     — hostname or IP of the staging server
      #   STAGING_USER     — SSH user (e.g. deploy)
      #   STAGING_PATH     — absolute path to docker-compose project on server
      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_PATH }}
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose up -d --no-build api
            docker image prune -f
