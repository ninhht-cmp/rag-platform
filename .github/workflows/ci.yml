name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run workflow on"
        required: true
        default: "main"
        type: string

env:
  PYTHON_VERSION: "3.12"
  SECRET_KEY: "ci_test_secret_key_32_chars_min_ok"
  ANTHROPIC_API_KEY: "test_key_not_real"
  ENVIRONMENT: "local"
  REDIS_URL: "redis://localhost:6379/0"
  DATABASE_URL: "postgresql+asyncpg://rag:rag@localhost:5432/rag_platform"

jobs:
  # ── Lint & typecheck ──────────────────────────────────────────
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install quality tools
        run: pip install ruff mypy pydantic pydantic-settings

      - name: Lint (ruff)
        run: ruff check app tests --output-format=github

      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports --no-strict-optional
        continue-on-error: true # informational for now

  # ── Unit tests ────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings \
            langchain langchain-openai langchain-anthropic langchain-community \
            langchain-text-splitters qdrant-client \
            redis python-jose passlib structlog orjson tenacity \
            jinja2 pypdf python-docx sqlalchemy asyncpg \
            pytest pytest-asyncio pytest-cov httpx factory-boy \
            python-multipart

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Integration tests ─────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings \
            langchain langchain-openai langchain-anthropic langchain-community \
            langchain-text-splitters qdrant-client \
            redis python-jose passlib structlog orjson tenacity \
            jinja2 pypdf python-docx sqlalchemy asyncpg \
            pytest pytest-asyncio httpx \
            python-multipart

      - name: Run integration tests
        run: pytest tests/integration/ tests/e2e/ -v --tb=short

  # ── E2E tests ─────────────────────────────────────────────────
  e2e-tests:
    name: E2E workflow tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings \
            langchain langchain-openai langchain-anthropic langchain-community \
            langchain-text-splitters qdrant-client \
            redis python-jose passlib structlog orjson tenacity \
            jinja2 pypdf python-docx sqlalchemy asyncpg \
            pytest pytest-asyncio httpx \
            python-multipart

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short

  # ── Docker build check ────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging (main branch only) ─────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests, e2e-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy notification
        run: echo "Deployed ${{ github.sha }} to staging"
