# .github/workflows/deploy.yml
# Deploy lên server sau khi CI pass trên main branch

name: Deploy

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/enterprise-ai-assistant
            git pull origin main
            docker compose -f infra/docker/docker-compose.prod.yml pull
            docker compose -f infra/docker/docker-compose.prod.yml up -d --no-build
            docker compose -f infra/docker/docker-compose.prod.yml exec -T rag-service alembic upgrade head
            echo "✅ Staging deployed at $(date)"

      - name: Health check staging
        run: |
          sleep 15
          curl -f https://staging.your-domain.com/health || exit 1
          echo "✅ Health check passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # Requires manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/enterprise-ai-agent \
            agent=ghcr.io/${{ github.repository }}/agent:${{ github.sha }} \
            -n enterprise-ai

          kubectl set image deployment/rag-service \
            rag-service=ghcr.io/${{ github.repository }}/rag-service:${{ github.sha }} \
            -n enterprise-ai

          kubectl rollout status deployment/enterprise-ai-agent -n enterprise-ai --timeout=300s
          kubectl rollout status deployment/rag-service -n enterprise-ai --timeout=300s

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Production deployment: $STATUS"
          # Add Slack/Telegram notification here
